<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q2 2026 — AI/ML Pipeline Review</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
  </style>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script id="jsx-source" type="text/plain">
    const { useState, useCallback, useEffect } = React;

    // ─── Constants ──────────────────────────────────────────────────────────
    const MONTHS = ["April", "May", "June"];
    const MONTH_STARTS = ["2026-04-01", "2026-05-01", "2026-06-01"];
    const Q2_END = new Date("2026-07-01"); // exclusive end of Q2

    const daysLeftInQ2 = (billingStartDate) => {
      if (!billingStartDate) return 0;
      return Math.max(0, Math.ceil((Q2_END - new Date(billingStartDate)) / 86400000));
    };

    const calcRevenue = (gpusSold, utilization, pricePerHour, billingStartDate) => {
      if (!billingStartDate || !gpusSold) return 0;
      const days = daysLeftInQ2(billingStartDate);
      return (gpusSold * (utilization / 100) * pricePerHour * days * 24) / 1_000_000;
    };

    let _trancheCounter = 0;
    const newId = () => `t-${++_trancheCounter}`;

    // ─── Base Data ──────────────────────────────────────────────────────────
    const GPU_FAMILIES = [
      {
        id: "b300-ac", name: "NVIDIA B300", badge: "AC",
        location: "RIC (QTS)", color: "#76b900", inventoryCap: 1344,
        aop:  { gpusAvail:[0,672,1344],  gpusSold:[0,605,1210],  utilization:[0,90,90],   pricePerHour:[3.6,3.6,3.6] },
        mgmt: { gpusAvail:[672,1344,1344],gpusSold:[605,1210,1210],utilization:[90,90,90], pricePerHour:[3.6,3.6,3.6] },
      },
      {
        id: "b300-lc", name: "NVIDIA B300", badge: "LC",
        location: "MKC (Patmos)", color: "#00b388", inventoryCap: 4096,
        aop:  { gpusAvail:[0,0,0], gpusSold:[0,0,0], utilization:[0,0,0], pricePerHour:[3.6,3.6,3.6] },
        mgmt: { gpusAvail:[0,0,0], gpusSold:[0,0,0], utilization:[0,0,0], pricePerHour:[3.6,3.6,3.6] },
      },
      {
        id: "mi350", name: "AMD MI350", badge: null,
        location: "RIC (QTS)", color: "#ed1c24", inventoryCap: 1536,
        aop:  { gpusAvail:[1536,1536,1536], gpusSold:[0,461,922],    utilization:[0,30,60],  pricePerHour:[1.8,1.8,1.8] },
        mgmt: { gpusAvail:[1536,1536,1536], gpusSold:[461,998,1382],  utilization:[30,65,90], pricePerHour:[2.0,2.0,2.0] },
      },
      {
        id: "mi350-plus", name: "AMD MI350+", badge: null,
        location: "MEM (5C)", color: "#f5a623", inventoryCap: 0,
        aop:  { gpusAvail:[0,0,0], gpusSold:[0,0,0], utilization:[0,0,0], pricePerHour:[2.2,2.2,2.2] },
        mgmt: { gpusAvail:[0,0,0], gpusSold:[0,0,0], utilization:[0,0,0], pricePerHour:[2.2,2.2,2.2] },
      },
    ];

    GPU_FAMILIES.forEach(gpu => {
      gpu.aop.revenue  = MONTHS.map((_,i) => calcRevenue(gpu.aop.gpusSold[i],  100, gpu.aop.pricePerHour[i],  MONTH_STARTS[i]));
      gpu.mgmt.revenue = MONTHS.map((_,i) => calcRevenue(gpu.mgmt.gpusSold[i], 100, gpu.mgmt.pricePerHour[i], MONTH_STARTS[i]));
    });

    const AIML_TOTAL_AOP  = [10.4, 12.8, 14.6];
    const AIML_TOTAL_MGMT = [12.8, 15.4, 15.5];

    // ─── Tranche helpers ────────────────────────────────────────────────────
    const makeTranche = (label, gpusSold, pricePerHour, billingStartDate, utilization = 98) =>
      ({ id: newId(), label, gpusSold, pricePerHour, billingStartDate, utilization });

    const initTranches = () => {
      const out = {};
      GPU_FAMILIES.forEach(gpu => {
        out[gpu.id] = {};
        MONTHS.forEach((_,i) => {
          out[gpu.id][i] = [makeTranche("Plan", gpu.mgmt.gpusSold[i], gpu.mgmt.pricePerHour[i], MONTH_STARTS[i])];
        });
      });
      return out;
    };

    // ─── Formatters ─────────────────────────────────────────────────────────
    const sum = arr => arr.reduce((a,b) => a+b, 0);
    const fmt$ = (v, d=1) => `${v<0?"-":""}$${Math.abs(v).toFixed(d)}M`;
    const fmtPct = v => `${v}%`;
    const varColor = v => v>0?"text-emerald-600":v<0?"text-red-500":"text-gray-400";
    const varBg = v => v>0?"bg-emerald-50 border-emerald-200":v<0?"bg-red-50 border-red-200":"bg-gray-50 border-gray-200";

    const TRANCHE_LABELS = ["Reserved","On-demand","Spot","Enterprise","SMB","Trial","Committed","Flex","Burst"];

    // ─── KpiCard ────────────────────────────────────────────────────────────
    function KpiCard({ label, value, sub, accent }) {
      return (
        <div className="bg-white rounded-xl border border-gray-200 px-5 py-4 flex flex-col gap-1 shadow-sm">
          <span className="text-xs font-medium text-gray-400 uppercase tracking-wide">{label}</span>
          <span className={`text-2xl font-bold ${accent||"text-gray-900"}`}>{value}</span>
          {sub && <span className="text-xs text-gray-500">{sub}</span>}
        </div>
      );
    }

    // ─── NumInput ───────────────────────────────────────────────────────────
    function NumInput({ value, onChange, step, min, max, isModified }) {
      const [local, setLocal] = useState(() => String(value));
      useEffect(() => { setLocal(String(value)); }, [value]);
      return (
        <input
          type="number"
          value={local}
          step={step||1}
          min={min??0}
          max={max}
          onChange={e => {
            setLocal(e.target.value);
            const n = parseFloat(e.target.value);
            if (!isNaN(n)) onChange(n);
          }}
          onBlur={() => {
            const n = parseFloat(local);
            let final = isNaN(n) ? 0 : Math.max(min??0, n);
            if (max !== undefined) final = Math.min(max, final);
            setLocal(String(final));
            onChange(final);
          }}
          className={`w-full text-right font-mono text-xs font-semibold rounded-md px-2 py-1 border focus:outline-none focus:ring-2 focus:ring-blue-300 transition-colors ${
            isModified ? "bg-amber-50 border-amber-300 text-amber-800" : "bg-blue-50 border-blue-200 text-blue-800"
          }`}
        />
      );
    }

    // ─── TrancheRow ─────────────────────────────────────────────────────────
    function TrancheRow({ tranche, monthIndex, aopGpu, planGpu, onUpdate, onRemove, canRemove, color, index, maxGpusSold }) {
      const revenue = calcRevenue(tranche.gpusSold, tranche.utilization, tranche.pricePerHour, tranche.billingStartDate);
      const days = daysLeftInQ2(tranche.billingStartDate);
      const isModified =
        tranche.label !== "Plan" ||
        tranche.gpusSold !== planGpu.gpusSold[monthIndex] ||
        tranche.pricePerHour !== planGpu.pricePerHour[monthIndex] ||
        tranche.utilization !== 98;

      const [showSuggestions, setShowSuggestions] = useState(false);

      return (
        <div className={`rounded-lg border px-3 py-2.5 ${isModified ? "border-amber-200 bg-amber-50/40" : "border-gray-100 bg-gray-50/50"}`}>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2 flex-1 min-w-0 relative">
              <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: color, opacity: 0.4 + index * 0.3 }} />
              <input
                type="text"
                value={tranche.label}
                onChange={e => onUpdate("label", e.target.value)}
                placeholder="Tranche name…"
                className="text-xs font-semibold text-gray-700 bg-transparent border-0 border-b border-dashed border-gray-300 focus:outline-none focus:border-blue-400 w-28 min-w-0"
              />
              <div className="relative">
                <button
                  onClick={() => setShowSuggestions(s => !s)}
                  className="text-gray-300 hover:text-gray-500 text-xs px-1"
                >▾</button>
                {showSuggestions && (
                  <div className="absolute left-0 top-5 z-20 bg-white border border-gray-200 rounded-lg shadow-lg py-1 w-32">
                    {TRANCHE_LABELS.map(l => (
                      <button key={l} onClick={() => { onUpdate("label", l); setShowSuggestions(false); }}
                        className="block w-full text-left px-3 py-1 text-xs text-gray-600 hover:bg-gray-50">
                        {l}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>
            <div className="flex items-center gap-2">
              <span className={`text-xs font-bold font-mono ${revenue > 0 ? "text-emerald-600" : "text-gray-400"}`}>
                {fmt$(revenue)}
              </span>
              {canRemove && (
                <button onClick={onRemove} className="text-gray-300 hover:text-red-400 transition-colors text-sm leading-none px-1" title="Remove tranche">×</button>
              )}
            </div>
          </div>
          <div className="grid grid-cols-3 gap-2 mb-2">
            {/* GPUs Sold */}
            <div className="flex flex-col gap-1">
              <span className="text-xs text-gray-400">GPUs Sold</span>
              <NumInput value={tranche.gpusSold} onChange={v => onUpdate("gpusSold", Math.round(v))} step={1}
                max={maxGpusSold} isModified={tranche.gpusSold !== planGpu.gpusSold[monthIndex]} />
              <span className="text-xs text-gray-300">AOP: {aopGpu.gpusSold[monthIndex].toLocaleString()}</span>
            </div>
            {/* % Utilization */}
            <div className="flex flex-col gap-1">
              <span className="text-xs text-gray-400">% Util</span>
              <NumInput value={tranche.utilization} onChange={v => onUpdate("utilization", Math.min(100, Math.max(0, v)))} step={1} min={0} max={100}
                isModified={tranche.utilization !== 98} />
              <span className="text-xs text-gray-300">{days}d left in Q2</span>
            </div>
            {/* Price / Hour */}
            <div className="flex flex-col gap-1">
              <span className="text-xs text-gray-400">$/hr</span>
              <div className="flex items-center gap-1">
                <span className="text-xs text-gray-400">$</span>
                <NumInput value={tranche.pricePerHour} onChange={v => onUpdate("pricePerHour", v)} step={0.1}
                  isModified={tranche.pricePerHour !== planGpu.pricePerHour[monthIndex]} />
              </div>
              <span className="text-xs text-gray-300">AOP: ${aopGpu.pricePerHour[monthIndex].toFixed(1)}</span>
            </div>
          </div>
          {/* Billing Start Date */}
          <div className="flex flex-col gap-1">
            <span className="text-xs text-gray-400">Billing Start Date</span>
            <input
              type="date"
              value={tranche.billingStartDate || ""}
              min="2026-04-01"
              max="2026-06-30"
              onChange={e => onUpdate("billingStartDate", e.target.value)}
              className={`w-full text-xs font-mono font-semibold rounded-md px-2 py-1 border focus:outline-none focus:ring-2 focus:ring-blue-300 transition-colors ${
                tranche.billingStartDate !== MONTH_STARTS[monthIndex] ? "bg-amber-50 border-amber-300 text-amber-800" : "bg-blue-50 border-blue-200 text-blue-800"
              }`}
            />
          </div>
        </div>
      );
    }

    // ─── GpuFamilyCard ──────────────────────────────────────────────────────
    function GpuFamilyCard({ gpu, monthIndex, tranches, onAddTranche, onUpdateTranche, onRemoveTranche, onResetTranches, onUpdateGpu, gpuLastUpdated, gpuHasPending }) {
      const monthTranches = tranches[gpu.id][monthIndex];
      const liveRevenue   = sum(monthTranches.map(t => calcRevenue(t.gpusSold, t.utilization, t.pricePerHour, t.billingStartDate)));
      const aopRevenue    = gpu.aop.revenue[monthIndex];
      const planRevenue   = gpu.mgmt.revenue[monthIndex];
      const revenueVsAop  = liveRevenue - aopRevenue;
      const liveGpusSold  = sum(monthTranches.map(t => t.gpusSold));
      const cap = gpu.inventoryCap;
      const inventoryLeft = cap > 0 ? cap - liveGpusSold : null;
      const inventoryOverCap = cap > 0 && liveGpusSold > cap;
      const isMultiTranche = monthTranches.length > 1;
      const isModified = isMultiTranche || monthTranches.some(t =>
        t.gpusSold !== gpu.mgmt.gpusSold[monthIndex] ||
        t.pricePerHour !== gpu.mgmt.pricePerHour[monthIndex] ||
        t.utilization !== 98
      );
      const planIsZero = gpu.mgmt.gpusSold[monthIndex] === 0;
      const liveIsZero = liveRevenue === 0 && !isModified;

      return (
        <div className="bg-white rounded-xl border shadow-sm overflow-hidden" style={{ borderColor: gpu.color + "40" }}>
          <div className="px-4 py-3 flex items-center justify-between" style={{ borderBottom: `2px solid ${gpu.color}` }}>
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-sm font-bold text-gray-900">{gpu.name}</span>
              {gpu.badge && (
                <span className="text-xs px-1.5 py-0.5 rounded font-mono font-semibold text-white" style={{ backgroundColor: gpu.color }}>
                  {gpu.badge}
                </span>
              )}
              {isMultiTranche && (
                <span className="text-xs px-2 py-0.5 rounded-full font-semibold border"
                      style={{ color: gpu.color, borderColor: gpu.color+"60", backgroundColor: gpu.color+"12" }}>
                  {monthTranches.length} tranches
                </span>
              )}
              {isModified && !isMultiTranche && (
                <span className="text-xs px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 border border-amber-200 font-semibold">modified</span>
              )}
            </div>
            <div className="flex items-center gap-2">
              <span className="text-xs text-gray-400">{gpu.location}</span>
              {isModified && (
                <button onClick={() => onResetTranches(gpu.id, monthIndex)} className="text-xs text-gray-400 hover:text-gray-700 underline">reset</button>
              )}
              <div className="flex flex-col items-end gap-0.5">
                <button
                  onClick={() => onUpdateGpu(gpu.id)}
                  className={`text-xs font-semibold text-white rounded-md px-2.5 py-1 transition-colors shadow-sm flex items-center gap-1 ${
                    gpuHasPending ? "bg-amber-500 hover:bg-amber-600" : "bg-blue-600 hover:bg-blue-700"
                  }`}
                >
                  <span>↻</span> Update{gpuHasPending ? " ●" : ""}
                </button>
                {gpuLastUpdated && (
                  <span className="text-xs text-gray-400 whitespace-nowrap">
                    {gpuLastUpdated.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
                  </span>
                )}
              </div>
            </div>
          </div>

          <div className="px-4 py-3 space-y-3">
            <div className={`rounded-lg border px-3 py-2 ${varBg(revenueVsAop)}`}>
              <div className="flex items-center justify-between">
                <span className="text-xs font-semibold text-gray-600">
                  Revenue {isMultiTranche ? `(${monthTranches.length} tranches)` : "(live)"}
                </span>
                <span className={`text-base font-bold ${varColor(revenueVsAop)}`}>{fmt$(liveRevenue)}</span>
              </div>
              <div className="flex items-center gap-3 mt-0.5 text-xs text-gray-400 flex-wrap">
                <span>AOP {fmt$(aopRevenue)} · Plan {fmt$(planRevenue)}</span>
                <span className={`font-semibold ${varColor(revenueVsAop)}`}>
                  {revenueVsAop >= 0 ? "+" : ""}{fmt$(revenueVsAop)} vs AOP
                </span>
                {isMultiTranche && (
                  <span className="text-gray-400">· {liveGpusSold.toLocaleString()} GPUs sold (agg)</span>
                )}
              </div>
              {inventoryLeft !== null && (
                <div className={`flex items-center justify-between mt-1.5 pt-1.5 border-t ${inventoryOverCap ? "border-red-200" : "border-gray-100"}`}>
                  <span className="text-xs text-gray-400">Inventory ({cap.toLocaleString()} total)</span>
                  <span className={`text-xs font-semibold font-mono ${inventoryOverCap ? "text-red-600" : inventoryLeft < cap * 0.1 ? "text-amber-600" : "text-emerald-600"}`}>
                    {inventoryOverCap ? "⚠ " : ""}{inventoryLeft.toLocaleString()} left
                  </span>
                </div>
              )}
            </div>

            {liveIsZero && planIsZero && !isModified ? (
              <div className="text-center text-xs text-gray-400 italic py-3">
                No activity in {MONTHS[monthIndex]} — ramps in H2
              </div>
            ) : (
              <div className="space-y-2">
                {monthTranches.map((tranche, idx) => {
                  const otherSold = cap > 0 ? sum(monthTranches.filter((_, i) => i !== idx).map(t => t.gpusSold)) : undefined;
                  return (
                    <TrancheRow
                      key={tranche.id}
                      tranche={tranche}
                      monthIndex={monthIndex}
                      aopGpu={gpu.aop}
                      planGpu={gpu.mgmt}
                      onUpdate={(field, val) => onUpdateTranche(gpu.id, monthIndex, tranche.id, field, val)}
                      onRemove={() => onRemoveTranche(gpu.id, monthIndex, tranche.id)}
                      canRemove={monthTranches.length > 1}
                      color={gpu.color}
                      index={idx}
                      maxGpusSold={cap > 0 ? cap - otherSold : undefined}
                    />
                  );
                })}
              </div>
            )}

            <button
              onClick={() => onAddTranche(gpu.id, monthIndex)}
              className="w-full text-xs py-1.5 rounded-lg border border-dashed border-gray-200 text-gray-400 hover:border-gray-400 hover:text-gray-600 transition-all flex items-center justify-center gap-1"
            >
              <span className="text-sm leading-none">+</span> Add tranche
            </button>
          </div>
        </div>
      );
    }

    // ─── SVG Bar Chart ───────────────────────────────────────────────────────
    function SimpleBarChart({ data, anyModified }) {
      const [tip, setTip] = useState(null);
      const W = 560, H = 220, ml = 52, mr = 16, mt = 8, mb = 32;
      const cw = W - ml - mr, ch = H - mt - mb;

      const aopFams = GPU_FAMILIES.filter(g => sum(g.aop.revenue) > 0);
      const series = [
        ...aopFams.map(g => ({ key: `${g.id}_aop`, label: `${g.name}${g.badge?' '+g.badge:''} · AOP`, color: g.color+'55' })),
        ...GPU_FAMILIES.map(g => ({ key: `${g.id}_live`, label: `${g.name}${g.badge?' '+g.badge:''} · ${anyModified?'Live':'Mgmt'}`, color: g.color })),
      ];

      const maxV = Math.max(...data.flatMap(d => series.map(s => d[s.key]||0)), 0.5);
      const yTicks = [0, 0.25, 0.5, 0.75, 1].map(f => parseFloat((f * maxV).toFixed(2)));
      const nBars = series.length;
      const groupW = cw / data.length;
      const bw = Math.min((groupW * 0.68) / nBars, 16);
      const totalW = nBars * bw + (nBars - 1) * 1.5;
      const sy = v => ch - (v / maxV) * ch;

      return (
        <div>
          <svg viewBox={`0 0 ${W} ${H}`} style={{width:'100%', height:H}} onMouseLeave={() => setTip(null)}>
            <g transform={`translate(${ml},${mt})`}>
              {yTicks.map((t, i) => (
                <g key={i}>
                  <line x1={0} x2={cw} y1={sy(t)} y2={sy(t)} stroke="#f0f0f0"/>
                  <text x={-4} y={sy(t)} textAnchor="end" dominantBaseline="middle" fontSize={10} fill="#9ca3af">${t}M</text>
                </g>
              ))}
              {data.map((d, gi) => {
                const cx = gi * groupW + groupW / 2;
                return series.map((s, si) => {
                  const v = d[s.key] || 0;
                  const bx = cx - totalW/2 + si * (bw + 1.5);
                  const bh = Math.max(ch - sy(v), 0);
                  return (
                    <rect key={`${gi}-${si}`} x={bx} y={sy(v)} width={bw} height={bh}
                      fill={s.color} rx={2} style={{cursor:'default'}}
                      onMouseEnter={() => setTip({ x: bx + bw/2 + ml, y: sy(v) + mt, label: s.label, v })}
                    />
                  );
                });
              })}
              <line x1={0} x2={cw} y1={ch} y2={ch} stroke="#e5e7eb"/>
              {data.map((d, gi) => (
                <text key={gi} x={gi * groupW + groupW/2} y={ch+18} textAnchor="middle" fontSize={12} fill="#6b7280">{d.month}</text>
              ))}
            </g>
            {tip && (
              <g>
                <rect x={Math.min(tip.x-65, W-140)} y={Math.max(tip.y-44,4)} width={132} height={38} fill="white" stroke="#e5e7eb" rx={6}/>
                <text x={Math.min(tip.x, W-74)} y={Math.max(tip.y-28,20)} textAnchor="middle" fontSize={9} fill="#6b7280">{tip.label}</text>
                <text x={Math.min(tip.x, W-74)} y={Math.max(tip.y-12,36)} textAnchor="middle" fontSize={12} fontWeight="bold" fill="#111827">${tip.v.toFixed(2)}M</text>
              </g>
            )}
          </svg>
          <div style={{display:'flex',flexWrap:'wrap',gap:'8px 14px',marginTop:6,fontSize:11,color:'#6b7280'}}>
            {series.map((s, i) => (
              <span key={i} style={{display:'flex',alignItems:'center',gap:5}}>
                <span style={{display:'inline-block',width:10,height:10,borderRadius:2,background:s.color,flexShrink:0}}/>
                {s.label}
              </span>
            ))}
          </div>
        </div>
      );
    }

    // ─── Chart data ─────────────────────────────────────────────────────────
    function buildChartData(tranches) {
      return MONTHS.map((month, i) => {
        const entry = { month };
        GPU_FAMILIES.forEach(gpu => {
          entry[`${gpu.id}_aop`]  = parseFloat(gpu.aop.revenue[i].toFixed(2));
          entry[`${gpu.id}_live`] = parseFloat(sum(tranches[gpu.id][i].map(t => calcRevenue(t.gpusSold, t.utilization, t.pricePerHour, t.billingStartDate))).toFixed(2));
        });
        return entry;
      });
    }

    // ─── Main App ────────────────────────────────────────────────────────────
    function App() {
      const [activeMonth, setActiveMonth] = useState(0);
      const [tranches, setTranches] = useState(initTranches);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [gpuLastUpdated, setGpuLastUpdated] = useState({});

      const addTranche = useCallback((gpuId, monthIndex) => {
        const gpu = GPU_FAMILIES.find(g => g.id === gpuId);
        setTranches(prev => ({
          ...prev,
          [gpuId]: {
            ...prev[gpuId],
            [monthIndex]: [...prev[gpuId][monthIndex], makeTranche(`Tranche ${prev[gpuId][monthIndex].length + 1}`, 0, gpu.mgmt.pricePerHour[monthIndex], MONTH_STARTS[monthIndex])],
          },
        }));
      }, []);

      const removeTranche = useCallback((gpuId, monthIndex, trancheId) => {
        setTranches(prev => {
          const updated = prev[gpuId][monthIndex].filter(t => t.id !== trancheId);
          if (updated.length === 0) return prev;
          return { ...prev, [gpuId]: { ...prev[gpuId], [monthIndex]: updated } };
        });
      }, []);

      const updateTranche = useCallback((gpuId, monthIndex, trancheId, field, value) => {
        setTranches(prev => ({
          ...prev,
          [gpuId]: {
            ...prev[gpuId],
            [monthIndex]: prev[gpuId][monthIndex].map(t => t.id === trancheId ? { ...t, [field]: value } : t),
          },
        }));
      }, []);

      const resetTranches = useCallback((gpuId, monthIndex) => {
        const gpu = GPU_FAMILIES.find(g => g.id === gpuId);
        const planTranche = makeTranche("Plan", gpu.mgmt.gpusSold[monthIndex], gpu.mgmt.pricePerHour[monthIndex], MONTH_STARTS[monthIndex]);
        setTranches(prev => ({ ...prev, [gpuId]: { ...prev[gpuId], [monthIndex]: [planTranche] } }));
      }, []);

      const resetAll = useCallback(() => {
        setTranches(initTranches());
        setLastUpdated(null);
        setGpuLastUpdated({});
      }, []);

      // Update buttons stamp a timestamp; KPIs are always live from tranches
      const updateForecast = useCallback(() => { setLastUpdated(new Date()); }, []);
      const updateGpu = useCallback((gpuId) => {
        setGpuLastUpdated(prev => ({ ...prev, [gpuId]: new Date() }));
      }, []);

      // All KPIs compute live from tranches — always current, no commit step needed
      const getLiveRevenue = (gpuId, monthIndex) =>
        sum(tranches[gpuId][monthIndex].map(t => calcRevenue(t.gpusSold, t.utilization, t.pricePerHour, t.billingStartDate)));

      const liveNewDcRevMonth = GPU_FAMILIES.reduce((acc, gpu) => acc + getLiveRevenue(gpu.id, activeMonth), 0);
      const aopNewDcRevMonth  = GPU_FAMILIES.reduce((acc, gpu) => acc + gpu.aop.revenue[activeMonth], 0);
      const liveNewDcQ2  = GPU_FAMILIES.reduce((acc, gpu) => acc + MONTHS.reduce((s,_,i) => s + getLiveRevenue(gpu.id, i), 0), 0);
      const aopNewDcQ2   = GPU_FAMILIES.reduce((acc, gpu) => acc + sum(gpu.aop.revenue), 0);
      const planNewDcQ2  = GPU_FAMILIES.reduce((acc, gpu) => acc + sum(gpu.mgmt.revenue), 0);
      const aimlAopQ2    = sum(AIML_TOTAL_AOP);
      const aimlMgmtQ2   = sum(AIML_TOTAL_MGMT);
      // AI/ML Q2 Revenue = GPU new DC revenue + rest of AI/ML (AIML_TOTAL_MGMT minus new DC plan)
      const aimlQ2LiveRevenue = liveNewDcQ2 + (aimlMgmtQ2 - planNewDcQ2);

      const anyModified = GPU_FAMILIES.some(gpu => MONTHS.some((_,i) => {
        const ts = tranches[gpu.id][i];
        return ts.length > 1 || ts[0].gpusSold !== gpu.mgmt.gpusSold[i] ||
          ts[0].pricePerHour !== gpu.mgmt.pricePerHour[i] || ts[0].utilization !== 98;
      }));
      // hasPending: show orange Update button when GPU has edits vs plan
      const hasPending = {};
      GPU_FAMILIES.forEach(gpu => {
        hasPending[gpu.id] = MONTHS.some((_, i) => {
          const ts = tranches[gpu.id][i];
          return ts.length > 1 || ts[0].gpusSold !== gpu.mgmt.gpusSold[i] ||
            ts[0].pricePerHour !== gpu.mgmt.pricePerHour[i] || ts[0].utilization !== 98;
        });
      });
      const chartData = buildChartData(tranches);

      return (
        <div className="min-h-screen bg-gray-50">
          {/* Top bar */}
          <div className="bg-white border-b border-gray-200 px-6 py-4">
            <div className="max-w-7xl mx-auto flex items-center justify-between">
              <div>
                <h1 className="text-xl font-bold text-gray-900">Q2 2026 — AI/ML Pipeline Review</h1>
                <p className="text-sm text-gray-500 mt-0.5">GPU Family Breakdown · Management vs. AOP · Tranche Scenarios</p>
              </div>
              <div className="flex items-center gap-3">
                {anyModified && (
                  <button onClick={resetAll} className="text-xs text-gray-500 hover:text-gray-800 border border-gray-200 rounded-lg px-3 py-1.5 bg-white hover:bg-gray-50 transition-colors">
                    ↺ Reset all to plan
                  </button>
                )}
                <div className="flex flex-col items-end gap-0.5">
                  <button onClick={updateForecast}
                    className="text-xs font-semibold bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-1.5 transition-colors shadow-sm flex items-center gap-1.5">
                    <span>↻</span> Update Forecast
                  </button>
                  {lastUpdated && (
                    <span className="text-xs text-gray-400">
                      updated {lastUpdated.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
                    </span>
                  )}
                </div>
                <span className="text-xs bg-blue-50 text-blue-700 font-semibold px-3 py-1.5 rounded-full border border-blue-200">
                  Apr · May · Jun 2026
                </span>
              </div>
            </div>
          </div>

          <div className="max-w-7xl mx-auto px-6 py-6 space-y-6">
            {/* KPIs */}
            <div className="grid grid-cols-2 gap-4 sm:grid-cols-4">
              <KpiCard label="AI/ML Q2 · Revenue" value={fmt$(aimlQ2LiveRevenue)}
                sub={`Plan: ${fmt$(aimlMgmtQ2)} · AOP: ${fmt$(aimlAopQ2)}`}
                accent={anyModified && aimlQ2LiveRevenue !== aimlMgmtQ2 ? "text-amber-600" : "text-blue-600"} />
              <KpiCard label="AI/ML Q2 · Variance vs AOP" value={`${aimlQ2LiveRevenue-aimlAopQ2>=0?"+":""}${fmt$(aimlQ2LiveRevenue-aimlAopQ2)}`}
                sub={`${(((aimlQ2LiveRevenue-aimlAopQ2)/aimlAopQ2)*100).toFixed(0)}% vs AOP`} accent={varColor(aimlQ2LiveRevenue-aimlAopQ2)} />
              <KpiCard
                label={anyModified ? "New DC Revenue · Live Q2" : "New DC Revenue · Plan Q2"}
                value={fmt$(liveNewDcQ2)}
                sub={anyModified ? `Plan ${fmt$(planNewDcQ2)} · AOP ${fmt$(aopNewDcQ2)}` : `AOP was ${fmt$(aopNewDcQ2)}`}
                accent={anyModified && liveNewDcQ2 !== planNewDcQ2 ? "text-amber-600" : undefined}
              />
              <KpiCard
                label="New DC · Variance vs AOP"
                value={`${liveNewDcQ2-aopNewDcQ2>=0?"+":""}${fmt$(liveNewDcQ2-aopNewDcQ2)}`}
                sub={aopNewDcQ2>0 ? `${(((liveNewDcQ2-aopNewDcQ2)/aopNewDcQ2)*100).toFixed(0)}% vs AOP` : "vs AOP"}
                accent={varColor(liveNewDcQ2-aopNewDcQ2)}
              />
            </div>

            {/* Chart */}
            <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-5">
              <div className="mb-4">
                <h2 className="text-sm font-bold text-gray-800">Revenue by GPU Family · April – June</h2>
                <p className="text-xs text-gray-400 mt-0.5">
                  $M · New DC deployments · Tranches aggregated
                  {anyModified && <span className="ml-2 text-amber-500 font-semibold">· showing live scenario</span>}
                </p>
              </div>
              <SimpleBarChart data={chartData} anyModified={anyModified} />
            </div>

            {/* Month Tabs */}
            <div>
              <div className="flex gap-2 mb-4 items-center flex-wrap">
                {MONTHS.map((month, i) => (
                  <button key={month} onClick={() => setActiveMonth(i)}
                    className={`px-5 py-2 rounded-lg text-sm font-semibold transition-all ${
                      activeMonth === i ? "bg-gray-900 text-white shadow-sm" : "bg-white text-gray-500 border border-gray-200 hover:border-gray-300"
                    }`}>{month}</button>
                ))}
                <div className="ml-auto flex items-center gap-4 text-xs text-gray-400">
                  <span className="flex items-center gap-1.5">
                    <span className="w-5 h-3.5 rounded bg-blue-50 border border-blue-200 inline-block" /> Editable
                  </span>
                  <span className="flex items-center gap-1.5">
                    <span className="w-5 h-3.5 rounded bg-amber-50 border border-amber-200 inline-block" /> Modified
                  </span>
                </div>
              </div>

              {/* Month summary */}
              <div className="bg-white rounded-xl border border-gray-100 px-5 py-3 mb-4 flex flex-wrap items-center gap-6 shadow-sm">
                <div className="text-xs text-gray-400 font-medium uppercase tracking-wide">{MONTHS[activeMonth]}</div>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-400">AI/ML Total:</span>
                  <span className="text-sm font-bold text-gray-800">{fmt$(AIML_TOTAL_MGMT[activeMonth])}</span>
                  <span className={`text-xs font-semibold ${varColor(AIML_TOTAL_MGMT[activeMonth]-AIML_TOTAL_AOP[activeMonth])}`}>
                    ({AIML_TOTAL_MGMT[activeMonth]-AIML_TOTAL_AOP[activeMonth]>=0?"+":""}{fmt$(AIML_TOTAL_MGMT[activeMonth]-AIML_TOTAL_AOP[activeMonth])} vs AOP)
                  </span>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-400">New DC GPUs (live):</span>
                  <span className={`text-sm font-bold ${anyModified?"text-amber-700":"text-gray-800"}`}>{fmt$(liveNewDcRevMonth)}</span>
                  <span className={`text-xs font-semibold ${varColor(liveNewDcRevMonth-aopNewDcRevMonth)}`}>
                    ({liveNewDcRevMonth-aopNewDcRevMonth>=0?"+":""}{fmt$(liveNewDcRevMonth-aopNewDcRevMonth)} vs AOP)
                  </span>
                </div>
              </div>

              {/* GPU Cards */}
              <div className="grid grid-cols-1 gap-4 sm:grid-cols-2">
                {GPU_FAMILIES.map(gpu => (
                  <GpuFamilyCard
                    key={gpu.id}
                    gpu={gpu}
                    monthIndex={activeMonth}
                    tranches={tranches}
                    onAddTranche={addTranche}
                    onUpdateTranche={updateTranche}
                    onRemoveTranche={removeTranche}
                    onResetTranches={resetTranches}
                    onUpdateGpu={updateGpu}
                    gpuLastUpdated={gpuLastUpdated[gpu.id]}
                    gpuHasPending={hasPending[gpu.id]}
                  />
                ))}
              </div>
            </div>

            <p className="text-xs text-gray-400 text-center pb-4">
              DigitalOcean Internal · AI/ML Targets 2026 · Revenue = GPUs Sold × $/hr × Hours in Month · Figures in $M · Updated Mar 24
            </p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  <script>
    window.onload = function() {
      var src = document.getElementById('jsx-source').textContent;
      var transformed = Babel.transform(src, { presets: ['react'] }).code;
      var script = document.createElement('script');
      script.textContent = transformed;
      document.body.appendChild(script);
    };
  </script>
</body>
</html>
